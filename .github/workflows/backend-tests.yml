name: Backend Tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run targeted backend hygiene checks
        run: >
          python -m flake8
          backend/app/api/admin_ml.py
          backend/app/services/ml/forecast_service.py
          backend/app/services/ml/model_trainer.py
          backend/app/services/ml/tasks.py
          backend/app/services/ml/training_contract.py
          backend/app/tests/test_admin_ml_api.py
          backend/app/tests/test_forecast_service_guards.py
          backend/app/tests/test_ml_tasks_accuracy.py
          backend/app/tests/test_ml_training_task_contract.py
          backend/app/tests/test_model_trainer_guards.py
          --select=F401,F841,E741

      - name: Run backend tests
        working-directory: backend
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          OPENWEATHER_API_KEY: test
          SECRET_KEY: test
        run: python -m pytest app/tests -q
