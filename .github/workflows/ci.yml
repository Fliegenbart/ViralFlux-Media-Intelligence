name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Flake8 (all backend code)
        run: python -m flake8 backend/app --max-line-length=120 --select=F401,F841,E741,E711,E712

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          OPENWEATHER_API_KEY: test
          SECRET_KEY: ci-test-secret-key-minimum-32-chars
          ADMIN_EMAIL: ci@test.de
          ADMIN_PASSWORD: ci-test-password-12chars
          ENVIRONMENT: test
        run: python -m pytest app/tests -q --tb=short

  backend-security:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pip-audit

      - name: Dependency audit
        run: pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-2024-* || true

      - name: Check for hardcoded secrets
        run: |
          # Fail if hardcoded credentials found in code
          if grep -rn "gelo2026\|GELO_ERP_SYNC_2026" backend/app/ --include="*.py"; then
            echo "ERROR: Hardcoded credentials found!"
            exit 1
          fi
          echo "No hardcoded credentials found."

  # ── Frontend ─────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit

      - name: TypeScript type check
        run: npx tsc --noEmit || true

      - name: Build production bundle
        run: npm run build
        env:
          CI: true

      - name: Check bundle size
        run: |
          TOTAL=$(du -sh build/ | cut -f1)
          echo "Bundle size: $TOTAL"

  # ── Docker ───────────────────────────────────────────────────
  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t viralflux-backend-test ./backend

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t viralflux-frontend-test .
