# Production-like live stack.
# This manifest is the canonical deploy target for fluxengine.labpulse.ai.
services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: virusradar_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-virusradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-virusradar_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-virusradar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - virusradar_network

  redis:
    image: redis:7-alpine
    container_name: viralflux_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - virusradar_network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: virusradar_backend
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-virusradar}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-virusradar_db}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-placeholder}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8001/v1}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - M2M_SECRET_KEY=${M2M_SECRET_KEY:-}
      - COCKPIT_ACCESS_PASSWORD=${COCKPIT_ACCESS_PASSWORD:-}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ADMIN_EMAIL=${ADMIN_EMAIL:?ADMIN_EMAIL must be set in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      - ENVIRONMENT=production
      - DB_AUTO_CREATE_SCHEMA=false
      - DB_ALLOW_RUNTIME_SCHEMA_UPDATES=false
      - STARTUP_STRICT_READINESS=true
      - READINESS_REQUIRE_BROKER=true
      - CORE_PRODUCTION_SCOPES=${CORE_PRODUCTION_SCOPES:-RSV A:h7}
      - VIRUS_WAVE_TRUTH_ENABLED=${VIRUS_WAVE_TRUTH_ENABLED:-true}
      - VIRUS_WAVE_TRUTH_RUNTIME_MODE=${VIRUS_WAVE_TRUTH_RUNTIME_MODE:-true}
      - VIRUS_WAVE_TRUTH_MATERIALIZED_MODE=${VIRUS_WAVE_TRUTH_MATERIALIZED_MODE:-false}
      - VIRUS_WAVE_TRUTH_ALLOW_RUNTIME_FALLBACK=${VIRUS_WAVE_TRUTH_ALLOW_RUNTIME_FALLBACK:-true}
      - ALLOWED_ORIGINS=https://fluxengine.labpulse.ai,https://www.fluxengine.labpulse.ai,https://labpulse.belegsync.com,http://5.9.106.75:8501
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    stop_grace_period: 30s
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - app_data:/app/data
      - ml_models:/app/app/ml_models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=5)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
    networks:
      - virusradar_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: viralflux_celery_worker
    restart: unless-stopped
    gpus: all
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "python", "-c", "from app.core.celery_app import celery_app; conn = celery_app.connection_for_read(); conn.ensure_connection(max_retries=1); conn.release()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - app_data:/app/data
      - ml_models:/app/app/ml_models
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "2.0"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-virusradar}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-virusradar_db}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-placeholder}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8001/v1}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - M2M_SECRET_KEY=${M2M_SECRET_KEY:-}
      - COCKPIT_ACCESS_PASSWORD=${COCKPIT_ACCESS_PASSWORD:-}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ADMIN_EMAIL=${ADMIN_EMAIL:?ADMIN_EMAIL must be set in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      - ENVIRONMENT=production
      - DB_AUTO_CREATE_SCHEMA=false
      - DB_ALLOW_RUNTIME_SCHEMA_UPDATES=false
      - CORE_PRODUCTION_SCOPES=${CORE_PRODUCTION_SCOPES:-RSV A:h7}
      - VIRUS_WAVE_TRUTH_ENABLED=${VIRUS_WAVE_TRUTH_ENABLED:-true}
      - VIRUS_WAVE_TRUTH_RUNTIME_MODE=${VIRUS_WAVE_TRUTH_RUNTIME_MODE:-true}
      - VIRUS_WAVE_TRUTH_MATERIALIZED_MODE=${VIRUS_WAVE_TRUTH_MATERIALIZED_MODE:-false}
      - VIRUS_WAVE_TRUTH_ALLOW_RUNTIME_FALLBACK=${VIRUS_WAVE_TRUTH_ALLOW_RUNTIME_FALLBACK:-true}
      - REGIONAL_XGBOOST_DEVICE=${REGIONAL_XGBOOST_DEVICE:-cpu}
      - REGIONAL_BACKTEST_N_SPLITS=${REGIONAL_BACKTEST_N_SPLITS:-5}
      - REGIONAL_BACKTEST_MIN_TRAIN_PERIODS=${REGIONAL_BACKTEST_MIN_TRAIN_PERIODS:-90}
      - REGIONAL_BACKTEST_MIN_TEST_PERIODS=${REGIONAL_BACKTEST_MIN_TEST_PERIODS:-21}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - virusradar_network

  celery_beat:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: viralflux_celery_beat
    restart: unless-stopped
    command: celery -A app.core.celery_app beat --loglevel=info
    healthcheck:
      test: ["CMD", "python", "-c", "from app.core.celery_app import celery_app; conn = celery_app.connection_for_read(); conn.ensure_connection(max_retries=1); conn.release()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-virusradar}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-virusradar_db}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-placeholder}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8001/v1}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - M2M_SECRET_KEY=${M2M_SECRET_KEY:-}
      - COCKPIT_ACCESS_PASSWORD=${COCKPIT_ACCESS_PASSWORD:-}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ADMIN_EMAIL=${ADMIN_EMAIL:?ADMIN_EMAIL must be set in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      - ENVIRONMENT=production
      - DB_AUTO_CREATE_SCHEMA=false
      - DB_ALLOW_RUNTIME_SCHEMA_UPDATES=false
      - CORE_PRODUCTION_SCOPES=${CORE_PRODUCTION_SCOPES:-RSV A:h7}
      - VIRUS_WAVE_TRUTH_ENABLED=${VIRUS_WAVE_TRUTH_ENABLED:-true}
      - VIRUS_WAVE_TRUTH_RUNTIME_MODE=${VIRUS_WAVE_TRUTH_RUNTIME_MODE:-true}
      - VIRUS_WAVE_TRUTH_MATERIALIZED_MODE=${VIRUS_WAVE_TRUTH_MATERIALIZED_MODE:-false}
      - VIRUS_WAVE_TRUTH_ALLOW_RUNTIME_FALLBACK=${VIRUS_WAVE_TRUTH_ALLOW_RUNTIME_FALLBACK:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - ml_models:/app/app/ml_models
    networks:
      - virusradar_network

  frontend-prod:
    image: viralflux-media-frontend
    container_name: virusradar_frontend_prod
    restart: unless-stopped
    ports:
      - "172.17.0.1:18080:80"
    depends_on:
      - backend
    networks:
      - virusradar_network

  frontend-staging:
    image: viralflux-media-frontend
    container_name: virusradar_frontend_staging
    restart: unless-stopped
    profiles: ["staging"]
    ports:
      - "127.0.0.1:18081:80"
    depends_on:
      - backend
    networks:
      - virusradar_network

volumes:
  postgres_data:
    driver: local
  app_data:
  ml_models:

networks:
  virusradar_network:
    driver: bridge
