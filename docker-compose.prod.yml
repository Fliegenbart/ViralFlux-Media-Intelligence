services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: virusradar_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-virusradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-virusradar_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-virusradar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - virusradar_network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: virusradar_backend
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-virusradar}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-virusradar_db}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-placeholder}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama2}
      - SECRET_KEY=${SECRET_KEY:-viralflux-prod-secret-key-change-me-2026}
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=https://labpulse.belegsync.com,http://5.9.106.75:8501
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - virusradar_network

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: virusradar_frontend
    restart: unless-stopped
    ports:
      - "172.17.0.1:18080:80"
      - "0.0.0.0:8501:80"
    depends_on:
      - backend
    networks:
      - virusradar_network

volumes:
  postgres_data:
    driver: local

networks:
  virusradar_network:
    driver: bridge
