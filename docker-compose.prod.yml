services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: virusradar_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-virusradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-virusradar_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-virusradar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - virusradar_network

  redis:
    image: redis:7-alpine
    container_name: viralflux_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - virusradar_network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: virusradar_backend
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-virusradar}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-virusradar_db}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-placeholder}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-viralflux-prod-secret-key-change-me-2026}
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=https://fluxengine.labpulse.ai,https://www.fluxengine.labpulse.ai,https://labpulse.belegsync.com,http://5.9.106.75:8501
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - ml_models:/app/app/ml_models
    networks:
      - virusradar_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: viralflux_celery_worker
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    healthcheck:
      disable: true
    volumes:
      - ml_models:/app/app/ml_models
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-virusradar}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-virusradar_db}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-placeholder}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-viralflux-prod-secret-key-change-me-2026}
      - ENVIRONMENT=production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - virusradar_network

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: virusradar_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - virusradar_network

  proxy:
    image: caddy:2.8
    container_name: virusradar_caddy_proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    networks:
      - virusradar_network

  frontend-staging:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: virusradar_frontend_staging
    restart: unless-stopped
    profiles: ["staging"]
    ports:
      - "127.0.0.1:18081:80"
    depends_on:
      - backend
    networks:
      - virusradar_network

volumes:
  postgres_data:
    driver: local
  ml_models:
  caddy_data:
  caddy_config:

networks:
  virusradar_network:
    driver: bridge
