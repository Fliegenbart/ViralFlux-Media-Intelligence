# Development compose only.
# Do not use this manifest for live deploys on fluxengine.labpulse.ai.
services:
  # PostgreSQL Database mit TimescaleDB Extension
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: virusradar_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-virusradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-virusradar_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-virusradar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - virusradar_network

  redis:
    image: redis:7-alpine
    container_name: viralflux_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - virusradar_network

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: virusradar_backend
    environment:
      - POSTGRES_HOST=virusradar_db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-virusradar}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-virusradar_db}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://localhost:8000/v1}
      - CELERY_BROKER_URL=redis://viralflux_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://viralflux_redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DB_AUTO_CREATE_SCHEMA=${DB_AUTO_CREATE_SCHEMA:-true}
      - DB_ALLOW_RUNTIME_SCHEMA_UPDATES=${DB_ALLOW_RUNTIME_SCHEMA_UPDATES:-true}
      - STARTUP_STRICT_READINESS=${STARTUP_STRICT_READINESS:-false}
      - READINESS_REQUIRE_BROKER=${READINESS_REQUIRE_BROKER:-false}
      - ALLOWED_ORIGINS=https://fluxengine.labpulse.ai,https://www.fluxengine.labpulse.ai,https://labpulse.belegsync.com,http://5.9.106.75:8501
    volumes:
      - ./backend:/app
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=5)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - virusradar_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: viralflux_celery_worker
    # Der Worker lauscht auf neue Jobs in der Queue (--concurrency steuert, wie viele Jobs parallel laufen)
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - POSTGRES_HOST=virusradar_db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-virusradar}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-virusradar_db}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DB_AUTO_CREATE_SCHEMA=${DB_AUTO_CREATE_SCHEMA:-true}
      - DB_ALLOW_RUNTIME_SCHEMA_UPDATES=${DB_ALLOW_RUNTIME_SCHEMA_UPDATES:-true}
      - CELERY_BROKER_URL=redis://viralflux_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://viralflux_redis:6379/0
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8000/v1} # Greift auf lokalen vLLM zu
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from app.core.celery_app import celery_app; conn = celery_app.connection_for_read(); conn.ensure_connection(max_retries=1); conn.release()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - virusradar_network

  # Celery Beat Scheduler (automatischer Daten-Import)
  celery_beat:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: viralflux_celery_beat
    command: celery -A app.core.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - POSTGRES_HOST=virusradar_db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-virusradar}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-virusradar_db}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DB_AUTO_CREATE_SCHEMA=${DB_AUTO_CREATE_SCHEMA:-true}
      - DB_ALLOW_RUNTIME_SCHEMA_UPDATES=${DB_ALLOW_RUNTIME_SCHEMA_UPDATES:-true}
      - CELERY_BROKER_URL=redis://viralflux_redis:6379/0
      - CELERY_RESULT_BACKEND=redis://viralflux_redis:6379/0
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from app.core.celery_app import celery_app; conn = celery_app.connection_for_read(); conn.ensure_connection(max_retries=1); conn.release()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - virusradar_network

  # Frontend React (dev mode — disabled in production)
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: virusradar_frontend
    profiles:
      - dev
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm start
    networks:
      - virusradar_network

  # Frontend Production (nginx serving built React + API proxy)
  frontend-prod:
    image: viralflux-media-frontend
    container_name: virusradar_frontend_prod
    ports:
      - "172.17.0.1:18080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - virusradar_network

  frontend-staging:
    image: viralflux-media-frontend
    container_name: virusradar_frontend_staging
    profiles:
      - staging
    ports:
      - "172.17.0.1:18081:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - virusradar_network

volumes:
  postgres_data:
    driver: local

networks:
  virusradar_network:
    driver: bridge
