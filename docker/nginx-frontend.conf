server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=30s;

    root /usr/share/nginx/html;
    index index.html;

    # Force runtime DNS resolution so backend container IP changes do not
    # leave nginx pinned to a stale upstream after a targeted recreate.
    set $backend_origin http://backend:8000;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # API requests → backend
    location /api/ {
        proxy_pass $backend_origin/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Health check → backend
    location /health {
        proxy_pass $backend_origin/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # FastAPI docs
    location /docs {
        proxy_pass $backend_origin/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass $backend_origin/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
